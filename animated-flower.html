<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flower ni Aizel 🌸</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:ital,wght@0,300;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        /* ==========================================================================
           1. CSS VARIABLES & RESET
           ========================================================================== */
        :root {
            /* Background */
            --bg-dark: #1a050d;
            --bg-light: #3d0e1e;

            /* Pink Palette for Flowers */
            --pink-blush-1: #ffd1dc;
            --pink-blush-2: #ffb6c1;
            --pink-hot-1: #ff69b4;
            --pink-hot-2: #ff1493;
            --pink-rose-1: #ff82ab;
            --pink-rose-2: #e066ff;
            --pink-peach-1: #ffbba6;
            --pink-peach-2: #ff9999;
            --pink-deep-1: #d81b60;
            --pink-deep-2: #ad1457;

            /* Wrapper / Cover Palette */
            --wrap-paper-1: #fdfcf5; 
            --wrap-paper-2: #f5eeda; 
            --wrap-mesh-1: rgba(255, 182, 193, 0.2); 

            /* Ribbon */
            --ribbon-1: #ff1493; 
            --ribbon-2: #880e4f; 
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, var(--bg-light) 0%, var(--bg-dark) 100%);
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            perspective: 1000px;
        }

        /* ==========================================================================
           2. MAIN CONTAINERS
           ========================================================================== */
        .master-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .bouquet-bunch {
            position: relative;
            width: 600px;
            height: 800px;
            animation: bouquet-float 6s ease-in-out infinite;
            transform-style: preserve-3d;
            z-index: 100;
        }

        @keyframes bouquet-float {
            0%, 100% { transform: translateY(0) rotateX(2deg); }
            50% { transform: translateY(-20px) rotateX(-1deg); }
        }

        .bouquet-flowers {
            position: absolute;
            width: 100%;
            height: 500px; 
            top: 0;
            left: 0;
            z-index: 20;
        }

        /* ==========================================================================
           3. FLOWER POSITIONING & SCALING
           ========================================================================== */
        .flower-wrapper {
            position: absolute;
            width: 280px; 
            height: 280px;
            margin-top: -140px;
            margin-left: -140px;
            transform-origin: center;
        }

        /* Static scale setup for fully formed flowers */
        .flower-wrapper:nth-child(1) { top: 220px; left: 50%; transform: scale(1.1); z-index: 27; } 
        .flower-wrapper:nth-child(2) { top: 170px; left: 35%; transform: scale(0.85); z-index: 25; }
        .flower-wrapper:nth-child(3) { top: 170px; left: 65%; transform: scale(0.85); z-index: 24; }
        .flower-wrapper:nth-child(4) { top: 290px; left: 28%; transform: scale(0.95); z-index: 26; }
        .flower-wrapper:nth-child(5) { top: 290px; left: 72%; transform: scale(0.95); z-index: 25; }
        .flower-wrapper:nth-child(6) { top: 370px; left: 40%; transform: scale(0.9); z-index: 28; }
        .flower-wrapper:nth-child(7) { top: 370px; left: 60%; transform: scale(0.9); z-index: 27; }

        /* ==========================================================================
           4. FLOWER PETAL STYLING (Fully Formed instantly)
           ========================================================================== */
        /* Colors */
        .flower-wrapper:nth-child(1) .outer-petal { background: linear-gradient(135deg, var(--pink-hot-1), var(--pink-deep-2)); }
        .flower-wrapper:nth-child(1) .inner-petal { background: linear-gradient(135deg, var(--pink-blush-2), var(--pink-hot-2)); }
        .flower-wrapper:nth-child(2) .outer-petal { background: linear-gradient(135deg, var(--pink-blush-1), var(--pink-rose-1)); }
        .flower-wrapper:nth-child(2) .inner-petal { background: linear-gradient(135deg, #fff, var(--pink-blush-2)); }
        .flower-wrapper:nth-child(3) .outer-petal { background: linear-gradient(135deg, var(--pink-peach-1), var(--pink-rose-1)); }
        .flower-wrapper:nth-child(3) .inner-petal { background: linear-gradient(135deg, #fff, var(--pink-peach-2)); }
        .flower-wrapper:nth-child(4) .outer-petal { background: linear-gradient(135deg, var(--pink-deep-1), var(--bg-light)); }
        .flower-wrapper:nth-child(4) .inner-petal { background: linear-gradient(135deg, var(--pink-hot-1), var(--pink-deep-2)); }
        .flower-wrapper:nth-child(5) .outer-petal { background: linear-gradient(135deg, var(--pink-rose-2), var(--pink-deep-1)); }
        .flower-wrapper:nth-child(5) .inner-petal { background: linear-gradient(135deg, var(--pink-blush-1), var(--pink-hot-1)); }
        .flower-wrapper:nth-child(6) .outer-petal { background: linear-gradient(135deg, var(--pink-peach-2), var(--pink-hot-2)); }
        .flower-wrapper:nth-child(6) .inner-petal { background: linear-gradient(135deg, var(--pink-blush-1), var(--pink-rose-1)); }
        .flower-wrapper:nth-child(7) .outer-petal { background: linear-gradient(135deg, var(--pink-rose-1), var(--pink-deep-1)); }
        .flower-wrapper:nth-child(7) .inner-petal { background: linear-gradient(135deg, var(--pink-blush-2), var(--pink-hot-1)); }

        .flower { position: relative; width: 100%; height: 100%; }
        
        .outer-petal, .inner-petal {
            position: absolute; top: 50%; left: 50%; transform-origin: bottom center;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        /* Set to be fully opened immediately, no animation to form */
        .outer-petal {
            width: 80px; height: 130px;
            border-radius: 50% 50% 15% 15% / 60% 60% 20% 20%;
            margin-top: -130px; margin-left: -40px;
            transform: rotate(var(--rotation)) rotateX(25deg);
            box-shadow: 0 5px 15px rgba(0,0,0,0.15);
        }
        
        .inner-petal {
            width: 55px; height: 95px;
            border-radius: 50% 50% 20% 20% / 70% 70% 25% 25%;
            margin-top: -95px; margin-left: -27.5px;
            transform: rotate(var(--rotation)) rotateX(15deg) scale(1.03);
            z-index: 2;
        }

        /* Static Rotations for Petals */
        .outer-petal:nth-child(1) { --rotation: 0deg; }
        .outer-petal:nth-child(2) { --rotation: 45deg; }
        .outer-petal:nth-child(3) { --rotation: 90deg; }
        .outer-petal:nth-child(4) { --rotation: 135deg; }
        .outer-petal:nth-child(5) { --rotation: 180deg; }
        .outer-petal:nth-child(6) { --rotation: 225deg; }
        .outer-petal:nth-child(7) { --rotation: 270deg; }
        .outer-petal:nth-child(8) { --rotation: 315deg; }
        .inner-petal:nth-child(9)  { --rotation: 22.5deg; }
        .inner-petal:nth-child(10) { --rotation: 67.5deg; }
        .inner-petal:nth-child(11) { --rotation: 112.5deg; }
        .inner-petal:nth-child(12) { --rotation: 157.5deg; }
        .inner-petal:nth-child(13) { --rotation: 202.5deg; }
        .inner-petal:nth-child(14) { --rotation: 247.5deg; }
        .inner-petal:nth-child(15) { --rotation: 292.5deg; }
        .inner-petal:nth-child(16) { --rotation: 337.5deg; }

        .center {
            position: absolute; width: 35px; height: 35px;
            background: radial-gradient(circle, #fff7d6 0%, #ffdf00 40%, #ff8c00 100%);
            border-radius: 50%; top: 50%; left: 50%; transform: translate(-50%, -50%);
            box-shadow: 0 0 20px rgba(255, 223, 0, 0.5); z-index: 10;
        }

        /* ==========================================================================
           5. BOUQUET WRAPPER (The Cover)
           ========================================================================= */
        .bouquet-cover {
            position: absolute;
            width: 100%; height: 100%; top: 0; left: 0; z-index: 10; overflow: hidden;
        }

        .cover-back {
            position: absolute; top: 120px; left: 50%; transform: translateX(-50%);
            width: 450px; height: 400px; background: var(--wrap-paper-1);
            background-image: 
                repeating-linear-gradient(45deg, var(--wrap-mesh-1) 0px, var(--wrap-mesh-1) 2px, transparent 2px, transparent 4px),
                linear-gradient(to bottom, var(--wrap-paper-1), var(--wrap-paper-2));
            border-radius: 50% 50% 0 0 / 100% 100% 0 0;
            box-shadow: inset 0 -20px 50px rgba(0,0,0,0.2);
        }

        .cover-front {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            width: 380px; height: 550px; background: var(--wrap-paper-2);
            background-image: 
                linear-gradient(105deg, transparent 40%, rgba(0,0,0,0.05) 41%, transparent 43%),
                linear-gradient(75deg, transparent 60%, rgba(0,0,0,0.05) 61%, transparent 63%),
                linear-gradient(to bottom right, var(--wrap-paper-1), #eaddc5);
            clip-path: polygon(15% 0%, 85% 0%, 100% 100%, 0% 100%);
            border-radius: 0 0 200px 200px;
            box-shadow: 0 -10px 30px rgba(0,0,0,0.3);
            z-index: 15;
        }

        .cover-ruffle {
            position: absolute; top: 180px; left: 50%; transform: translateX(-50%);
            width: 500px; height: 100px; background: var(--wrap-paper-1); z-index: 16;
            background-image: radial-gradient(circle at 50% 150%, transparent 60%, var(--wrap-paper-1) 61%);
            background-size: 40px 100px; background-repeat: repeat-x; opacity: 0.8;
        }

        /* ==========================================================================
           6. RIBBON & BOW
           ========================================================================== */
        .ribbon-bunch {
            position: absolute; bottom: 180px; left: 50%; transform: translateX(-50%);
            width: 100px; height: 100px; z-index: 30;
        }

        .bow-knot {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 30px; height: 40px; background: radial-gradient(circle, var(--ribbon-1), var(--ribbon-2));
            border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.3); z-index: 3;
        }

        .bow-loop {
            position: absolute; top: 50%; width: 75px; height: 70px;
            background: var(--ribbon-1);
            box-shadow: inset 0 0 15px rgba(0,0,0,0.3); z-index: 2;
        }

        .bow-loop.left {
            right: 50%; transform-origin: right center;
            border-radius: 50% 15% 15% 50%;
            animation: loop-flutter-l 4s ease-in-out infinite;
        }

        .bow-loop.right {
            left: 50%; transform-origin: left center;
            border-radius: 15% 50% 50% 15%;
            animation: loop-flutter-r 4s ease-in-out infinite;
        }

        .bow-tail {
            position: absolute; top: 55%; width: 40px; height: 100px;
            background: linear-gradient(to bottom, var(--ribbon-1), transparent);
            clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 50% 85%, 0% 100%); opacity: 0.9;
            transform-origin: top center; z-index: 1;
        }

        .bow-tail.left {
            left: 50%; margin-left: -25px;
            animation: tail-flutter-l 3s ease-in-out infinite;
        }

        .bow-tail.right {
            left: 50%; margin-left: -5px;
            animation: tail-flutter-r 3.5s ease-in-out infinite;
        }

        @keyframes loop-flutter-l { 
            0%, 100% { transform: translateY(-50%) rotate(-15deg) scaleX(1); } 
            50% { transform: translateY(-50%) rotate(-10deg) scaleX(1.05); } 
        }
        @keyframes loop-flutter-r { 
            0%, 100% { transform: translateY(-50%) rotate(15deg) scaleX(1); } 
            50% { transform: translateY(-50%) rotate(10deg) scaleX(1.05); } 
        }
        @keyframes tail-flutter-l { 
            0%, 100% { transform: rotate(15deg); } 
            50% { transform: rotate(20deg); } 
        }
        @keyframes tail-flutter-r { 
            0%, 100% { transform: rotate(-15deg); } 
            50% { transform: rotate(-20deg); } 
        }

        /* ==========================================================================
           7. TYPOGRAPHY & MESSAGE
           ========================================================================== */
        .message-box {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            text-align: center; width: 100%; z-index: 100;
        }

        .main-message {
            font-family: 'Dancing Script', cursive; font-size: 52px; color: #fff;
            text-shadow: 0 0 10px #ff69b4, 0 0 20px #ff1493, 0 0 40px #d81b60; margin-bottom: 5px;
        }

        .sub-message {
            font-family: 'Montserrat', sans-serif; font-size: 16px; font-weight: 300; letter-spacing: 4px;
            color: #ffd1dc; text-transform: uppercase;
        }

        /* ==========================================================================
           8. CUTE BUGS (CSS Butterflies)
           ========================================================================== */
        .particle { position: absolute; pointer-events: none; z-index: 150; }
        
        .butterfly {
            width: 6px;
            height: 14px;
            background: #ff1493; /* Body */
            border-radius: 4px;
            animation: fly-around linear forwards;
        }

        .butterfly::before, .butterfly::after {
            content: '';
            position: absolute;
            top: 1px;
            width: 12px;
            height: 16px;
            background: rgba(255, 182, 193, 0.85); /* Pink Wings */
            box-shadow: 0 0 8px rgba(255, 105, 180, 0.6);
            border-radius: 50% 50% 10% 50%;
        }

        .butterfly::before {
            right: 3px;
            transform-origin: right center;
            animation: flap-l 0.15s ease-in-out infinite alternate;
        }

        .butterfly::after {
            left: 3px;
            border-radius: 50% 50% 50% 10%;
            transform-origin: left center;
            animation: flap-r 0.15s ease-in-out infinite alternate;
        }

        @keyframes flap-l {
            0% { transform: rotateY(0deg) rotateZ(-10deg); }
            100% { transform: rotateY(70deg) rotateZ(-10deg); }
        }

        @keyframes flap-r {
            0% { transform: rotateY(0deg) rotateZ(10deg); }
            100% { transform: rotateY(-70deg) rotateZ(10deg); }
        }

        @keyframes fly-around {
            0% { transform: translate(0, 110vh) scale(0.5) rotate(var(--angle)); opacity: 0; }
            10% { opacity: 1; }
            30% { transform: translate(calc(60px * var(--dir-x)), 70vh) scale(0.8) rotate(var(--angle)); }
            60% { transform: translate(calc(-40px * var(--dir-x)), 40vh) scale(1) rotate(var(--angle)); }
            85% { opacity: 1; }
            100% { transform: translate(calc(80px * var(--dir-x)), -10vh) scale(1.2) rotate(var(--angle)); opacity: 0; }
        }
    </style>
</head>
<body>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('environment');
            const screenWidth = window.innerWidth;

            function createButterfly() {
                const bug = document.createElement('div');
                bug.classList.add('particle', 'butterfly');
                
                // Randomize spawn location, duration, and direction
                const startX = Math.random() * screenWidth;
                const duration = Math.random() * 8 + 6; // 6 to 14 seconds
                const directionX = Math.random() > 0.5 ? 1 : -1;
                
                // Tilt the butterfly slightly toward the direction it's flying
                const angle = directionX === 1 ? '15deg' : '-15deg';

                bug.style.left = `${startX}px`;
                bug.style.setProperty('--dir-x', directionX);
                bug.style.setProperty('--angle', angle);
                bug.style.animationDuration = `${duration}s`;

                container.appendChild(bug);

                // Remove from DOM once animation finishes
                setTimeout(() => {
                    bug.remove();
                }, duration * 1000);
            }

            // Spawn bugs periodically
            setInterval(createButterfly, 800);

            // Initial burst of bugs so the screen isn't empty on load
            for(let i = 0; i < 8; i++) {
                setTimeout(createButterfly, i * 300);
            }
        });
    </script>
