<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #e8d5f2 0%, #f5d0e8 25%, #e8b4d8 50%, #d8b4e8 75%, #f0d4f0 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #5a4a6a;
      position: relative;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Floating hearts */
    .heart {
      position: absolute;
      color: rgba(168, 85, 247, 0.4);
      animation: floatUp 8s linear infinite;
      pointer-events: auto;
      cursor: pointer;
      text-shadow: 0 0 10px rgba(168, 85, 247, 0.3);
      transition: transform 0.3s ease, filter 0.3s ease;
      z-index: 5;
    }

    .heart:hover {
      transform: scale(1.5);
      filter: brightness(1.3);
    }

    @keyframes floatUp {
      0% { transform: translateY(100vh) scale(0.3) rotate(0deg); opacity: 0; }
      10% { opacity: 0.6; }
      50% { opacity: 0.8; }
      90% { opacity: 0.4; }
      100% { transform: translateY(-10vh) scale(1) rotate(360deg); opacity: 0; }
    }

    /* Glassmorphism card */
    .card {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 50px 40px;
      border-radius: 30px;
      text-align: center;
      width: 90%;
      max-width: 420px;
      box-shadow: 
        0 8px 32px rgba(168, 85, 247, 0.15),
        0 0 60px rgba(236, 72, 153, 0.1),
        inset 0 0 30px rgba(255, 255, 255, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.4);
      animation: fadeIn 1.5s ease-out;
      position: relative;
      z-index: 10;
    }

    @keyframes fadeIn {
      from { 
        opacity: 0; 
        transform: translateY(30px) scale(0.95); 
      }
      to { 
        opacity: 1; 
        transform: translateY(0) scale(1); 
      }
    }

    .card::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.3), rgba(236, 72, 153, 0.3), rgba(168, 85, 247, 0.3));
      border-radius: 32px;
      z-index: -1;
      opacity: 0.5;
      filter: blur(8px);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 15px;
      font-weight: 600;
      color: #6b4c7a;
      text-shadow: 0 2px 10px rgba(168, 85, 247, 0.2);
      min-height: 40px;
    }

    .subtitle {
      font-size: 15px;
      opacity: 0.85;
      line-height: 1.6;
      margin-bottom: 25px;
      color: #7a5a8a;
    }

    .compliment {
      font-size: 16px;
      font-style: italic;
      color: #8b5a9a;
      margin-bottom: 25px;
      min-height: 50px;
      opacity: 0;
      animation: fadeInCompliment 0.8s ease forwards;
      line-height: 1.5;
    }

    @keyframes fadeInCompliment {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Mood selector */
    .mood-selector {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .mood-btn {
      padding: 10px 18px;
      border: 2px solid rgba(168, 85, 247, 0.3);
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.4);
      cursor: pointer;
      font-size: 16px;
      transition: all 0.3s ease;
      color: #6b4c7a;
    }

    .mood-btn:hover {
      background: rgba(168, 85, 247, 0.2);
      transform: scale(1.05);
    }

    .mood-btn.active {
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.6), rgba(236, 72, 153, 0.6));
      color: white;
      border-color: transparent;
    }

    .action-buttons {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 12px;
      margin-top: 15px;
    }

    button {
      padding: 14px 24px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.8), rgba(236, 72, 153, 0.8));
      color: white;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 0.5px;
      box-shadow: 
        0 4px 15px rgba(168, 85, 247, 0.3),
        0 0 20px rgba(236, 72, 153, 0.2);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 
        0 6px 20px rgba(168, 85, 247, 0.4),
        0 0 30px rgba(236, 72, 153, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    button::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    button:active::after {
      width: 200px;
      height: 200px;
    }

    /* Typing cursor */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 28px;
      background: #a855f7;
      margin-left: 2px;
      animation: blink 1s infinite;
      vertical-align: middle;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    /* Heart burst effect */
    .heart-burst {
      position: fixed;
      pointer-events: none;
      z-index: 1000;
    }

    .heart-burst span {
      position: absolute;
      font-size: 24px;
      animation: burst 1s ease-out forwards;
    }

    @keyframes burst {
      0% {
        transform: translate(0, 0) scale(0);
        opacity: 1;
      }
      100% {
        transform: translate(var(--tx), var(--ty)) scale(1);
        opacity: 0;
      }
    }

    /* Responsive design */
    @media (max-width: 480px) {
      .card {
        padding: 40px 30px;
        width: 85%;
      }

      h1 {
        font-size: 24px;
      }

      .subtitle {
        font-size: 14px;
      }

      .compliment {
        font-size: 15px;
      }

      button {
        padding: 12px 20px;
        font-size: 13px;
      }

      .mood-btn {
        padding: 8px 14px;
        font-size: 14px;
      }
    }

    /* Soft glow effect */
    .glow {
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.15) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      animation: glowPulse 4s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.2); opacity: 0.8; }
    }

    .hidden {
      display: none;
    }
  </style>
</head>

    // Typing animation
    function typeText(element, text, speed = 80) {
      let i = 0;
      element.innerHTML = '<span class="cursor"></span>';
      
      function type() {
        if (i < text.length) {
          element.innerHTML = text.substring(0, i + 1) + '<span class="cursor"></span>';
          i++;
          setTimeout(type, speed);
        } else {
          element.innerHTML = text;
        }
      }
      type();
    }

    // Heart burst effect
    function createHeartBurst(x, y) {
      const burst = document.createElement('div');
      burst.className = 'heart-burst';
      burst.style.left = x + 'px';
      burst.style.top = y + 'px';
      
      const emojis = ['💜', '💗', '🌸', '✨', '💕', '🌷', '💖', '😊', '💝'];
      
      for (let i = 0; i < 12; i++) {
        const span = document.createElement('span');
        span.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        
        const angle = (i / 12) * Math.PI * 2;
        const distance = 50 + Math.random() * 50;
        const tx = Math.cos(angle) * distance;
        const ty = Math.sin(angle) * distance;
        
        span.style.setProperty('--tx', tx + 'px');
        span.style.setProperty('--ty', ty + 'px');
        
        burst.appendChild(span);
      }
      
      document.body.appendChild(burst);
      
      setTimeout(() => {
        burst.remove();
      }, 1000);
    }

        heart.remove();
      });

      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 10000);
    }

    // Start everything
    initialize();
    setInterval(createHeart, 500);
  </script>
