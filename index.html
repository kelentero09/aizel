<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aizel Smile 💜</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #e8d5f2 0%, #f5d0e8 25%, #e8b4d8 50%, #d8b4e8 75%, #f0d4f0 100%);
      background-size: 400% 400%;
      animation: gradientShift 15s ease infinite;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #5a4a6a;
      position: relative;
    }

    @keyframes gradientShift {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    /* Floating hearts */
    .heart {
      position: absolute;
      color: rgba(168, 85, 247, 0.4);
      animation: floatUp 8s linear infinite;
      pointer-events: none;
      text-shadow: 0 0 10px rgba(168, 85, 247, 0.3);
    }

    @keyframes floatUp {
      0% { transform: translateY(100vh) scale(0.3) rotate(0deg); opacity: 0; }
      10% { opacity: 0.6; }
      50% { opacity: 0.8; }
      90% { opacity: 0.4; }
      100% { transform: translateY(-10vh) scale(1) rotate(360deg); opacity: 0; }
    }

    /* Glassmorphism card */
    .card {
      background: rgba(255, 255, 255, 0.25);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 50px 40px;
      border-radius: 30px;
      text-align: center;
      width: 90%;
      max-width: 380px;
      box-shadow: 
        0 8px 32px rgba(168, 85, 247, 0.15),
        0 0 60px rgba(236, 72, 153, 0.1),
        inset 0 0 30px rgba(255, 255, 255, 0.3);
      border: 1px solid rgba(255, 255, 255, 0.4);
      animation: fadeIn 1.5s ease-out;
      position: relative;
      z-index: 10;
    }

    @keyframes fadeIn {
      from { 
        opacity: 0; 
        transform: translateY(30px) scale(0.95); 
      }
      to { 
        opacity: 1; 
        transform: translateY(0) scale(1); 
      }
    }

    .card::before {
      content: '';
      position: absolute;
      top: -2px;
      left: -2px;
      right: -2px;
      bottom: -2px;
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.3), rgba(236, 72, 153, 0.3), rgba(168, 85, 247, 0.3));
      border-radius: 32px;
      z-index: -1;
      opacity: 0.5;
      filter: blur(8px);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 15px;
      font-weight: 600;
      color: #6b4c7a;
      text-shadow: 0 2px 10px rgba(168, 85, 247, 0.2);
      min-height: 40px;
    }

    .subtitle {
      font-size: 15px;
      opacity: 0.85;
      line-height: 1.6;
      margin-bottom: 25px;
      color: #7a5a8a;
    }

    .compliment {
      font-size: 16px;
      font-style: italic;
      color: #8b5a9a;
      margin-bottom: 25px;
      min-height: 50px;
      opacity: 0;
      animation: fadeInCompliment 0.8s ease forwards;
      line-height: 1.5;
    }

    @keyframes fadeInCompliment {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    button {
      margin-top: 10px;
      padding: 14px 28px;
      border: none;
      border-radius: 25px;
      cursor: pointer;
      background: linear-gradient(135deg, rgba(168, 85, 247, 0.8), rgba(236, 72, 153, 0.8));
      color: white;
      font-weight: 600;
      font-size: 14px;
      letter-spacing: 0.5px;
      box-shadow: 
        0 4px 15px rgba(168, 85, 247, 0.3),
        0 0 20px rgba(236, 72, 153, 0.2);
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 
        0 6px 20px rgba(168, 85, 247, 0.4),
        0 0 30px rgba(236, 72, 153, 0.3);
    }

    button:active {
      transform: translateY(0);
    }

    button::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      width: 0;
      height: 0;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      transition: width 0.6s, height 0.6s;
    }

    button:active::after {
      width: 200px;
      height: 200px;
    }

    /* Typing cursor */
    .cursor {
      display: inline-block;
      width: 2px;
      height: 28px;
      background: #a855f7;
      margin-left: 2px;
      animation: blink 1s infinite;
      vertical-align: middle;
    }

    @keyframes blink {
      0%, 50% { opacity: 1; }
      51%, 100% { opacity: 0; }
    }

    /* Responsive design */
    @media (max-width: 480px) {
      .card {
        padding: 40px 30px;
        width: 85%;
      }

      h1 {
        font-size: 24px;
      }

      .subtitle {
        font-size: 14px;
      }

      .compliment {
        font-size: 15px;
      }

      button {
        padding: 12px 24px;
        font-size: 13px;
      }
    }

    /* Soft glow effect */
    .glow {
      position: absolute;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(168, 85, 247, 0.15) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      animation: glowPulse 4s ease-in-out infinite;
    }

    @keyframes glowPulse {
      0%, 100% { transform: scale(1); opacity: 0.5; }
      50% { transform: scale(1.2); opacity: 0.8; }
    }
  </style>
</head>

<body>
  <div class="glow" style="top: 10%; left: 10%;"></div>
  <div class="glow" style="bottom: 10%; right: 10%; animation-delay: 2s;"></div>

  <div class="card">
    <h1 id="greeting"></h1>
    <p class="subtitle" id="subtitle"></p>
    <p class="compliment" id="compliment"></p>
    <button onclick="changeCompliment()">✨ Send a little joy</button>
  </div>

  <script>
    const greetings = [
      "Hello, Aizel 💜",
      "Hey there, Aizel ✨",
      "Hi Aizel 🌸",
      "Hello, beautiful soul 💗"
    ];

    const subtitles = [
      "This little corner of the internet is just for you",
      "Made with warmth, just to brighten your day",
      "A gentle reminder that you're appreciated",
      "Because you deserve a moment of joy"
    ];

    const compliments = [
      "Your smile has this way of lighting up a room, you know? 💜",
      "There's something so peaceful about your presence, Aizel 🌸",
      "You have this quiet strength that's truly inspiring ✨",
      "The way you see the world is beautiful, never lose that 💗",
      "You deserve all the gentle moments life has to offer 🌷",
      "Your kindness radiates in ways you might not even notice 💜",
      "Simply being you is enough, and that's wonderful ✨",
      "You bring a special kind of warmth wherever you go 🌸",
      "The world is better with you in it, Aizel 💗",
      "Your grace and elegance are truly captivating ✨"
    ];

    let currentGreeting = "";
    let currentSubtitle = "";
    let greetingIndex = 0;
    let subtitleIndex = 0;

    // Typing animation
    function typeText(element, text, speed = 80) {
      let i = 0;
      element.innerHTML = '<span class="cursor"></span>';
      
      function type() {
        if (i < text.length) {
          element.innerHTML = text.substring(0, i + 1) + '<span class="cursor"></span>';
          i++;
          setTimeout(type, speed);
        } else {
          element.innerHTML = text;
        }
      }
      type();
    }

    // Initialize with typing animation
    function initialize() {
      greetingIndex = Math.floor(Math.random() * greetings.length);
      subtitleIndex = Math.floor(Math.random() * subtitles.length);
      
      setTimeout(() => {
        typeText(document.getElementById("greeting"), greetings[greetingIndex], 100);
      }, 500);
      
      setTimeout(() => {
        typeText(document.getElementById("subtitle"), subtitles[subtitleIndex], 60);
      }, 2000);

      setTimeout(() => {
        changeCompliment();
      }, 3500);
    }

    // Change compliment with fade animation
    function changeCompliment() {
      const complimentEl = document.getElementById("compliment");
      complimentEl.style.animation = 'none';
      complimentEl.offsetHeight; // Trigger reflow
      complimentEl.style.opacity = '0';
      
      setTimeout(() => {
        const randomIndex = Math.floor(Math.random() * compliments.length);
        complimentEl.textContent = compliments[randomIndex];
        complimentEl.style.animation = 'fadeInCompliment 0.8s ease forwards';
      }, 300);
    }

    // Floating hearts generator
    function createHeart() {
      const heart = document.createElement("div");
      heart.classList.add("heart");
      
      const heartEmojis = ['💜', '💗', '🌸', '✨', '💕', '🌷', '💖'];
      heart.innerText = heartEmojis[Math.floor(Math.random() * heartEmojis.length)];

      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = Math.random() * 25 + 12 + "px";
      heart.style.animationDuration = (Math.random() * 4 + 6) + "s";

      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 10000);
    }

    // Start everything
    initialize();
    setInterval(createHeart, 500);
  </script>

</body>
</html>
